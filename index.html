<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>国旗マスター・エボリューション</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap');
        
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #0f172a;
            color: #1e293b;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: manipulation;
        }

        #app-container {
            width: 95%;
            max-width: 480px;
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            height: 92vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* 判定演出 */
        #judge-overlay {
            position: absolute;
            inset: 0;
            z-index: 500;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 200px;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .judge-show { opacity: 1 !important; transform: scale(1.2); }

        /* ゲット演出 */
        #capture-scene {
            position: absolute;
            inset: 0;
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #ffffff 0%, #e2e8f0 100%);
        }

        .ball {
            font-size: 4.5rem;
            position: absolute;
            bottom: 15%;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
            transition: all 0.5s cubic-bezier(0.5, 0, 0.5, 1);
            z-index: 202;
        }

        .ball-throw {
            bottom: 55% !important;
            transform: scale(0.3) rotate(1440deg);
        }

        @keyframes flash {
            0% { background: white; }
            100% { background: transparent; }
        }
        .flash-effect { animation: flash 0.4s ease-out; position: absolute; inset: 0; z-index: 210; pointer-events: none; }

        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: gold;
            z-index: 205;
            animation: confetti-fall 2s linear forwards;
        }

        @keyframes shake-intense {
            0%, 100% { transform: translate(0, 0) rotate(0); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-8px, 0) rotate(-2deg); }
            20%, 40%, 60%, 80% { transform: translate(8px, 0) rotate(2deg); }
        }
        .shake-intense { animation: shake-intense 0.5s ease-in-out; }

        .flag-render {
            font-size: clamp(80px, 15vh, 130px);
            line-height: 1.2;
            filter: drop-shadow(0 20px 25px rgba(0,0,0,0.1));
        }

        .choice-btn {
            transition: all 0.2s;
            border: 2px solid #f1f5f9;
            min-height: 64px;
            font-weight: 900;
        }
        .choice-btn:active { transform: scale(0.95); }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        #modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            z-index: 600;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- 判定演出用 -->
        <div id="judge-overlay"></div>

        <!-- ゲット演出レイヤー -->
        <div id="capture-scene">
            <div id="fx-layer"></div>
            <div id="target-flag" class="flag-render mb-12"></div>
            <div id="ball-action-msg" class="text-blue-600 font-black text-2xl mb-4 opacity-0 transition-opacity italic tracking-widest">カントリーボールをなげた！</div>
            <div id="capture-ball" class="ball">⚽</div>
            <div id="capture-msg" class="mt-24 text-4xl font-black opacity-0"></div>
        </div>

        <!-- 図鑑詳細モーダル -->
        <div id="modal-overlay" onclick="closeModal()">
            <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl scale-in" onclick="event.stopPropagation()">
                <div id="modal-content"></div>
                <button onclick="closeModal()" class="w-full mt-6 bg-slate-100 py-4 rounded-2xl font-black text-slate-500 hover:bg-slate-200 transition">とじる</button>

    async function handleAnswer(choice) {
        if (state.isAnswering) return;
        state.isAnswering = true;
        const q = state.quiz[state.index];
        const isCorrect = choice === q.name;
        
        const overlay = document.getElementById('judge-overlay');
        overlay.textContent = isCorrect ? '⭕️' : '❌';
        overlay.style.color = isCorrect ? '#22c55e' : '#ef4444';
        overlay.classList.add('judge-show');

        const btn = document.getElementById(`choice-${choice}`);
        btn.classList.add(isCorrect ? 'bg-green-100' : 'bg-red-100', isCorrect ? 'text-green-700' : 'text-red-700', isCorrect ? 'border-green-300' : 'border-red-300');

        await new Promise(r => setTimeout(r, 800));
        overlay.classList.remove('judge-show');

        if (!isCorrect) {
            state.isAnswering = false;
            nextQuestion();
            return;
        }

        // 正解＝名前判明
        if (!state.known.includes(q.flag)) {
            state.known.push(q.flag);
            localStorage.setItem(STORAGE_KNOWN, JSON.stringify(state.known));
        }

        // 豪華ゲット演出開始
        const scene = document.getElementById('capture-scene');
        const target = document.getElementById('target-flag');
        const ball = document.getElementById('capture-ball');
        const actionMsg = document.getElementById('ball-action-msg');
        const msg = document.getElementById('capture-msg');
        const fxLayer = document.getElementById('fx-layer');
        
        // 演出リセット
        msg.classList.add('opacity-0');
        msg.classList.remove('animate-bounce');
        msg.textContent = ""; 

        target.textContent = q.flag;
        target.className = 'flag-render mb-12';
        ball.className = 'ball';
        ball.style.display = 'block';
        actionMsg.classList.add('opacity-0');
        scene.style.display = 'flex';

        await new Promise(r => setTimeout(r, 300));
        
        // 投球演出
        actionMsg.classList.remove('opacity-0');
        ball.classList.add('ball-throw');
        
        await new Promise(r => setTimeout(r, 500));
        
        // ヒット時フラッシュ
        const flash = document.createElement('div');
        flash.className = 'flash-effect';
        fxLayer.appendChild(flash);
        setTimeout(() => flash.remove(), 400);

        ball.style.display = 'none';
        target.classList.add('shake-intense');
        actionMsg.classList.add('opacity-0');
        
        // 当たってから揺れている間を待つ（ここで判定が見えないようにする）
        await new Promise(r => setTimeout(r, 700));

        // 成功判定
        const success = Math.random() < 0.5; // 50%
        if (success) {
            msg.textContent = "SUCCESS!!";
            msg.className = "mt-24 text-4xl font-black text-yellow-500 opacity-100 animate-bounce drop-shadow-lg";
            state.score++;
            
            // 紙吹雪エフェクト
            for(let i=0; i<40; i++) {
                createConfetti();
            }

            if (!state.collection.includes(q.flag)) {
                state.collection.push(q.flag);
                localStorage.setItem(STORAGE_COLLECTION, JSON.stringify(state.collection));
            }
        } else {
            msg.textContent = "MISSED...";
            msg.className = "mt-24 text-3xl font-black text-slate-400 opacity-100";
            target.style.opacity = "0.2";
        }

        await new Promise(r => setTimeout(r, 1500));
        scene.style.display = 'none';
        target.style.opacity = "1";
        state.isAnswering = false;
        nextQuestion();
    }

    function createConfetti() {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.backgroundColor = ['#fbbf24', '#f59e0b', '#3b82f6', '#ef4444', '#10b981'][Math.floor(Math.random()*5)];
        c.style.width = (Math.random() * 8 + 5) + 'px';
        c.style.height = c.style.width;
        c.style.animationDuration = (Math.random() * 1 + 1) + 's';
        document.getElementById('fx-layer').appendChild(c);
        setTimeout(() => c.remove(), 2000);
    }

    function nextQuestion() {
        if (state.index < 9) {
            state.index++; render();
        } else {
            state.screen = 'result'; render();
        }
    }

                    <h3 class="text-3xl font-black text-slate-800 mb-6">${country.n}</h3>
                    <div class="bg-blue-50 border-2 border-dashed border-blue-200 p-6 rounded-[2.5rem]">
                        <p class="text-blue-600 font-black text-sm leading-relaxed uppercase tracking-tighter">Caught status: No</p>
                        <p class="text-slate-500 font-bold text-xs mt-2 italic">ゲットすると機密データが解禁されます</p>
                    </div>
                </div>
            `;
        } else {
            content.innerHTML = `
                <div class="text-center">
                    <div class="bg-gradient-to-r from-yellow-400 to-orange-400 text-white text-[10px] font-black w-fit mx-auto px-4 py-1.5 rounded-full mb-6 shadow-md uppercase tracking-widest">Mastered</div>
                    <div class="text-[110px] mb-4 drop-shadow-xl">${country.f}</div>
                    <h3 class="text-4xl font-black text-slate-800 mb-8 tracking-tighter">${country.n}</h3>
                    <div class="space-y-4 text-left">
                        <div class="bg-blue-600 text-white p-5 rounded-[2.5rem] shadow-lg">
                            <span class="text-[10px] font-black opacity-60 block uppercase mb-1 tracking-widest">Capital City</span>
                            <p class="font-black text-2xl">${country.c || "---"}</p>
                        </div>
                        <div class="bg-slate-100 p-6 rounded-[2.5rem]">
                            <span class="text-[10px] font-black text-slate-400 block uppercase mb-2 tracking-widest">National Data</span>
                            <p class="text-slate-700 text-sm font-bold leading-relaxed">${country.k || "詳細データ収集中..."}</p>
                        </div>
                    </div>
                </div>
            `;
        }
        modal.style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    function startQuiz() {
        const shuffled = [...countryData].sort(() => Math.random() - 0.5);
        state.quiz = shuffled.slice(0, 10).map(c => {
            let opts = [c.n];
            let pool = countryData.filter(x => x.n !== c.n).sort(() => Math.random() - 0.5);
            opts.push(...pool.slice(0, 3).map(x => x.n));
            return { flag: c.f, name: c.n, options: opts.sort(() => Math.random() - 0.5) };
        });
        state.index = 0; state.score = 0; state.screen = 'quiz'; render();
    }

    function goHome() { state.screen = 'title'; render(); }
    function showCollection() { state.screen = 'collection'; render(); }
    
    window.onload = render;
</script>
</body>
</html>
