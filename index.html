<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>国旗マスター・エボリューション</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap');
        
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #0f172a;
            color: #1e293b;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: manipulation;
        }

        #app-container {
            width: 95%;
            max-width: 480px;
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            height: 92vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* 判定オーバーレイ */
        #judge-overlay {
            position: absolute;
            inset: 0;
            z-index: 500;
            pointer-events: none;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgba(255,255,255,0.4);
            backdrop-filter: blur(2px);
        }
        #judge-icon { font-size: 160px; transform: scale(0.5); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .judge-show #judge-icon { transform: scale(1); }

        /* タイマーバー */
        .timer-container { width: 100%; height: 8px; background: #f1f5f9; position: relative; overflow: hidden; }
        .timer-bar { height: 100%; background: #3b82f6; width: 100%; transition: width 0.1s linear; }
        .timer-low { background: #ef4444 !important; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        /* ゲット演出レイヤー */
        #capture-scene {
            position: absolute;
            inset: 0;
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #ffffff 0%, #f1f5f9 100%);
            overflow: hidden;
        }

        .halo-effect {
            position: absolute;
            width: 800px;
            height: 800px;
            background: conic-gradient(from 0deg, transparent 0deg, rgba(255, 215, 0, 0.4) 10deg, transparent 20deg, transparent 30deg, rgba(255, 215, 0, 0.4) 40deg, transparent 50deg, transparent 60deg, rgba(255, 215, 0, 0.4) 70deg, transparent 80deg, transparent 90deg, rgba(255, 215, 0, 0.4) 100deg, transparent 110deg, transparent 120deg, rgba(255, 215, 0, 0.4) 130deg, transparent 140deg, transparent 150deg, rgba(255, 215, 0, 0.4) 160deg, transparent 170deg, transparent 180deg, rgba(255, 215, 0, 0.4) 190deg, transparent 200deg, transparent 210deg, rgba(255, 215, 0, 0.4) 220deg, transparent 230deg, transparent 240deg, rgba(255, 215, 0, 0.4) 250deg, transparent 260deg, transparent 270deg, rgba(255, 215, 0, 0.4) 280deg, transparent 290deg, transparent 300deg, rgba(255, 215, 0, 0.4) 310deg, transparent 320deg, transparent 330deg, rgba(255, 215, 0, 0.4) 340deg, transparent 350deg);
            animation: rotate-halo 10s linear infinite;
            z-index: 201;
            display: none;
            mask-image: radial-gradient(circle, black 20%, transparent 70%);
            -webkit-mask-image: radial-gradient(circle, black 20%, transparent 70%);
        }
        @keyframes rotate-halo { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .ball {
            font-size: 5rem;
            position: absolute;
            bottom: 10%;
            left: 50%;
            margin-left: -2.5rem;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
            transition: all 0.6s cubic-bezier(0.17, 0.67, 0.36, 1.2);
            z-index: 202;
            transform: scale(1);
        }

        .ball-thrown { bottom: 50% !important; transform: scale(0.4) rotate(1080deg) translateY(50px); }

        @keyframes ball-wiggle {
            0%, 100% { transform: scale(0.4) rotate(0deg); }
            20% { transform: scale(0.4) rotate(-15deg); }
            40% { transform: scale(0.4) rotate(15deg); }
            60% { transform: scale(0.4) rotate(-10deg); }
            80% { transform: scale(0.4) rotate(10deg); }
        }
        .ball-wiggle { animation: ball-wiggle 0.4s ease-in-out infinite; }

        @keyframes flash {
            0% { background: white; opacity: 1; }
            100% { background: transparent; opacity: 0; }
        }
        .flash-effect { animation: flash 0.4s ease-out; position: absolute; inset: 0; z-index: 210; pointer-events: none; }

        .flag-render {
            font-size: clamp(80px, 15vh, 130px);
            line-height: 1.2;
            filter: drop-shadow(0 20px 25px rgba(0,0,0,0.1));
            transition: all 0.3s ease;
        }

        .choice-btn {
            transition: all 0.2s;
            border: 2px solid #f1f5f9;
            min-height: 64px;
            font-weight: 900;
        }
        .choice-btn:active { transform: scale(0.95); background-color: #f8fafc; }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        @keyframes heart-float {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tw-x), var(--tw-y)) scale(1.5); opacity: 0; }
        }
        .heart-particle { position: absolute; pointer-events: none; animation: heart-float 1s forwards ease-out; }

        @keyframes fade-in-out {
            0% { opacity: 0; transform: scale(0.8); }
            20% { opacity: 1; transform: scale(1.1); }
            80% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.8); }
        }
        .animate-flag-switch { animation: fade-in-out 3s infinite; }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="judge-overlay">
            <div id="judge-icon"></div>
        </div>

        <div id="capture-scene">
            <div id="fx-layer"></div>
            <div id="halo-ring" class="halo-effect"></div>
            <div id="target-flag" class="flag-render mb-12 text-center"></div>
            <div id="ball-action-msg" class="text-blue-600 font-black text-2xl mb-4 opacity-0 transition-opacity italic tracking-widest z-[205]"></div>
            <div id="capture-ball" class="ball">🌏</div>
            <div id="capture-msg" class="mt-24 text-center z-[205] opacity-0 transition-opacity duration-300"></div>
        </div>

        <!-- モーダル系 -->
        <div id="modal-overlay" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[600] hidden items-center justify-center p-6" onclick="closeModal()">
            <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl flex flex-col max-h-[85vh]" onclick="event.stopPropagation()">
                <div id="modal-content" class="overflow-y-auto custom-scroll flex-1 pr-2"></div>
                <button onclick="uiClick(); closeModal()" class="w-full mt-6 bg-slate-100 py-4 rounded-2xl font-black text-slate-500 hover:bg-slate-200 transition shrink-0">とじる</button>
            </div>
        </div>

        <div id="confirm-overlay" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[700] hidden items-center justify-center p-6">
            <div class="bg-white w-full max-w-xs rounded-[3rem] p-8 shadow-2xl text-center">
                <div id="confirm-content"></div>
                <div class="grid grid-cols-2 gap-4 mt-6">
                    <button id="confirm-yes" class="bg-red-500 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition">はい</button>
                    <button onclick="uiClick(); closeConfirm()" class="bg-slate-100 text-slate-500 font-black py-4 rounded-2xl active:scale-95 transition">いいえ</button>
                </div>
            </div>
        </div>

        <div id="game-content" class="h-full flex flex-col"></div>
    </div>

    const STORAGE_COLLECTION = 'flag_master_v22_caught';
    const STORAGE_KNOWN = 'flag_master_v22_known';
    const LIMIT_TIME = 10;
    
    // --- 音響システム ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playTone(freq, duration, type = 'sine', volume = 0.1) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    const sounds = {
        btn: () => playTone(880, 0.1, 'sine', 0.05), // ボタン押下
        correct: () => {
            playTone(523.25, 0.1, 'square', 0.05);
            setTimeout(() => playTone(659.25, 0.2, 'square', 0.05), 100);
        },
        wrong: () => {
            playTone(220, 0.1, 'sawtooth', 0.1);
            setTimeout(() => playTone(196, 0.3, 'sawtooth', 0.1), 100);
        },
        throw: () => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        },
        catch: () => {
            [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => {
                setTimeout(() => playTone(f, 0.4, 'triangle', 0.08), i * 100);
            });
        },
        tick: () => playTone(880, 0.05, 'sine', 0.02)
    };

    function uiClick() {
        initAudio();

    }

    // --- 状態管理 ---
    let state = {
        screen: 'title',

                    <div class="text-[80px] mb-4">🌏</div>
                    <h2 class="text-2xl font-black mb-2 uppercase tracking-widest">Result</h2>
                    <div class="text-xl font-bold mb-2 opacity-80">正解数: ${state.correctCount} / 10</div>
                    <div class="text-xl font-bold mb-2">ゲット数:</div>

                    <div class="w-full max-w-xs space-y-4">

                        <button onclick="uiClick(); goHome()" class="w-full bg-blue-700 text-white font-black py-4 rounded-3xl active:scale-95 border border-blue-500">タイトルへ</button>

                                const isCaught = state.collection.includes(c.f);
                                const isKnown = state.known.includes(c.f);
                                return `
                                    <div onclick="uiClick(); showDetails('${c.f}')" class="aspect-square relative rounded-3xl flex flex-col items-center justify-center transition-all bg-white shadow-sm border-2 ${isCaught ? 'border-yellow-400' : (isKnown ? 'border-blue-100' : 'border-slate-50 opacity-20')}">
                                        ${isCaught ? '<div class="absolute -top-1 -right-1 bg-yellow-400 rounded-full w-6 h-6 flex items-center justify-center text-[10px] shadow-sm">⭐</div>' : ''}
                                        <div class="text-[44px] ${!isKnown ? 'grayscale' : ''}">${c.f}</div>
                                        <div class="text-[8px] font-black text-slate-400 mt-2 px-1 truncate w-full text-center">${isKnown ? c.n : '？？？'}</div>

    }

    function startTimer() {
        clearInterval(state.timerInterval);
        state.timeLeft = LIMIT_TIME;
        const bar = document.getElementById('timer-bar');
        state.timerInterval = setInterval(() => {
            state.timeLeft -= 0.1;
            const percentage = (state.timeLeft / LIMIT_TIME) * 100;
            if (bar) {
                bar.style.width = percentage + "%";
                if (state.timeLeft <= 3) {
                    bar.classList.add('timer-low');
                    if (Math.abs(state.timeLeft % 0.5) < 0.1) sounds.tick();
                }
            }
            if (state.timeLeft <= 0) {
                clearInterval(state.timerInterval);
                handleAnswer(null);
            }
        }, 100);
    }

    function startTitleFlagRotation() {
        if(titleFlagInterval) clearInterval(titleFlagInterval);
        titleFlagInterval = setInterval(() => {
            state.titleFlag = countryData[Math.floor(Math.random()*countryData.length)].f;
            const el = document.getElementById('title-flag-display');
            if(el) el.textContent = state.titleFlag;
        }, 3000);
    }

    function stopTitleFlagRotation() {
        if(titleFlagInterval) clearInterval(titleFlagInterval);
    }

    async function handleAnswer(choice) {
        initAudio();
        if (state.isAnswering) return;
        state.isAnswering = true;
        clearInterval(state.timerInterval);

        const q = state.quiz[state.index];
        const isCorrect = choice === q.name;
        const isAlreadyCaught = state.collection.includes(q.flag);
        
        const overlay = document.getElementById('judge-overlay');
        const judgeIcon = document.getElementById('judge-icon');
        const questionText = document.getElementById('quiz-question-text');
        
        judgeIcon.textContent = isCorrect ? '⭕️' : '❌';
        judgeIcon.style.color = isCorrect ? '#22c55e' : '#ef4444';
        
        overlay.style.display = 'flex';
        setTimeout(() => overlay.classList.add('judge-show'), 10);

        if (isCorrect) sounds.correct(); else sounds.wrong();

        if (!isCorrect) {
            await new Promise(r => setTimeout(r, 600));
            overlay.classList.remove('judge-show');
            setTimeout(() => overlay.style.display = 'none', 300);
            if (questionText) {
                questionText.textContent = choice === null ? "時間切れ！" : "ちがうみたい...";
                questionText.classList.add('text-red-500');
            }
            await new Promise(r => setTimeout(r, 1200));
            state.isAnswering = false;
            nextQuestion();
            return;
        }

        state.correctCount++;
        if (!state.known.includes(q.flag)) {
            state.known.push(q.flag);
            localStorage.setItem(STORAGE_KNOWN, JSON.stringify(state.known));
        }

        await new Promise(r => setTimeout(r, 800));
        overlay.classList.remove('judge-show');
        setTimeout(() => overlay.style.display = 'none', 300);

        // ゲット演出開始
        const scene = document.getElementById('capture-scene');
        const target = document.getElementById('target-flag');
        const ball = document.getElementById('capture-ball');
        const actionMsg = document.getElementById('ball-action-msg');
        const resultMsgArea = document.getElementById('capture-msg');
        const fxLayer = document.getElementById('fx-layer');
        const halo = document.getElementById('halo-ring');
        
        resultMsgArea.classList.add('opacity-0');
        halo.style.display = 'none';
        target.textContent = q.flag;
        target.style.opacity = "1";
        target.style.transform = "scale(1)";
        ball.classList.remove('ball-thrown', 'ball-wiggle');
        ball.style.display = 'block';
        ball.style.bottom = "10%";
        scene.style.display = 'flex';

        await new Promise(r => setTimeout(r, 200));

        if (isAlreadyCaught) {
            actionMsg.textContent = "すでに仲間の国だ！";
            actionMsg.classList.remove('opacity-0');
            ball.style.display = 'none';
            for(let i=0; i<15; i++) setTimeout(() => createHeart(fxLayer), i * 50);
            await new Promise(r => setTimeout(r, 1800));
        } else {
            actionMsg.textContent = "ボールをなげた！";
            actionMsg.classList.remove('opacity-0');
            ball.classList.add('ball-thrown');
            sounds.throw();
            
            await new Promise(r => setTimeout(r, 550));
            
            target.style.transform = "scale(0)";
            target.style.opacity = "0";
            const flash = document.createElement('div');
            flash.className = 'flash-effect';
            fxLayer.appendChild(flash);
            setTimeout(() => flash.remove(), 400);

            ball.classList.add('ball-wiggle');
            actionMsg.classList.add('opacity-0');

            const waitTime = Math.random() > 0.6 ? 2400 : 1200; 
            for(let j=0; j<waitTime/400; j++) {
                setTimeout(() => sounds.tick(), j * 400);
            }
            await new Promise(r => setTimeout(r, waitTime));

            ball.classList.remove('ball-wiggle');
            const success = Math.random() < 0.65; 

            if (success) {
                sounds.catch();
                halo.style.display = 'block'; 
                resultMsgArea.innerHTML = `
                    <div class="text-red-600 font-black text-2xl mb-1">${q.name}</div>
                    <div class="text-5xl font-black text-yellow-500 animate-bounce">GET！</div>
                `;
                resultMsgArea.classList.remove('opacity-0');
                state.getScore++;
                for(let i=0; i<30; i++) createConfetti(fxLayer);
                state.collection.push(q.flag);
                localStorage.setItem(STORAGE_COLLECTION, JSON.stringify(state.collection));
                ball.style.transform = "scale(0.4) rotate(0deg)";
            } else {
                sounds.wrong();
                resultMsgArea.innerHTML = `<div class="text-3xl font-black text-slate-400">逃げられた...</div>`;
                resultMsgArea.classList.remove('opacity-0');
                ball.style.display = 'none';
                target.style.opacity = "0.3";
                target.style.transform = "scale(0.8)";
            }
            await new Promise(r => setTimeout(r, 2200));
        }

        scene.style.display = 'none';
        state.isAnswering = false;
        nextQuestion();
    }

    function createHeart(parent) {
        const h = document.createElement('div');
        h.textContent = '💕'; h.className = 'heart-particle text-3xl';
        h.style.left = '50%'; h.style.top = '40%';
        const tx = (Math.random() - 0.5) * 300;
        const ty = (Math.random() - 0.5) * 300 - 100;
        h.style.setProperty('--tw-x', `${tx}px`);
        h.style.setProperty('--tw-y', `${ty}px`);
        parent.appendChild(h);
        setTimeout(() => h.remove(), 1000);
    }

    function createConfetti(parent) {
        const c = document.createElement('div');
        c.className = 'absolute w-2 h-2 rounded-full pointer-events-none';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.backgroundColor = ['#fbbf24', '#3b82f6', '#ef4444', '#10b981'][Math.floor(Math.random()*4)];
        c.style.top = '-20px';
        parent.appendChild(c);
        const duration = Math.random() * 2 + 1;
        c.animate([{ transform: 'translateY(0) rotate(0deg)', opacity: 1 }, { transform: `translateY(100vh) rotate(${Math.random() * 720}deg)`, opacity: 0 }], { duration: duration * 1000 });
        setTimeout(() => c.remove(), duration * 1000);
    }

    function nextQuestion() {
        if (state.index < 9) { state.index++; render(); } else { state.screen = 'result'; render(); }
    }

    function showDetails(flagEmoji) {
        const country = countryData.find(c => c.f === flagEmoji);
        const isCaught = state.collection.includes(flagEmoji);
        const isKnown = state.known.includes(flagEmoji);
        const modal = document.getElementById('modal-overlay');
        const content = document.getElementById('modal-content');
        if (!isKnown) {
            content.innerHTML = `<div class="text-center py-6"><div class="text-8xl opacity-10 mb-6">${flagEmoji}</div><h3 class="text-2xl font-black text-slate-300 italic">UNKNOWN</h3></div>`;
        } else {
            content.innerHTML = `
                <div class="text-center pb-6">
                    <div class="text-8xl mb-4 drop-shadow-xl">${country.f}</div>
                    <h3 class="text-3xl font-black text-slate-800 mb-6">${country.n}</h3>
                    ${isCaught ? `
                        <div class="bg-blue-600 text-white p-5 rounded-3xl shadow-lg text-left">
                            <span class="text-[10px] font-black opacity-60 block uppercase mb-1">首都</span>
                            <p class="font-black text-xl">${country.c || "---"}</p>
                        </div>
                        <div class="bg-slate-100 p-5 rounded-3xl mt-4 text-left">
                            <p class="text-slate-700 text-sm font-bold leading-relaxed">${country.k || "詳細データ収集中..."}</p>
                        </div>
                    ` : `<div class="p-6 border-2 border-dashed border-slate-200 rounded-3xl text-slate-400 font-bold">ゲットすると詳細が見れます</div>`}
                </div>`;
        }
        modal.classList.remove('hidden'); modal.classList.add('flex');
    }

    function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
    function closeConfirm() { document.getElementById('confirm-overlay').classList.add('hidden'); }

    function showHowTo() {
        const content = document.getElementById('modal-content');
        content.innerHTML = `
            <div class="text-left space-y-6 pb-6">
                <div class="bg-blue-50 p-6 rounded-[2rem]">
                    <h3 class="text-blue-600 font-black text-lg mb-2">🎮 基本ルール</h3>
                    <p class="text-slate-600 text-sm leading-relaxed font-bold">
                        1問につき制限時間は10秒です。正しい国名を選んでください。1回の調査は10問です。
                    </p>
                </div>
                <div class="bg-amber-50 p-6 rounded-[2rem]">
                    <h3 class="text-amber-600 font-black text-lg mb-2">🌏 キャッチの仕組み</h3>
                    <p class="text-slate-600 text-sm leading-relaxed font-bold">
                        クイズに正解すると、ボールを投げるチャンスが発生します。命中しても逃げられてしまうこともあります。
                    </p>
                </div>
                <div class="bg-green-50 p-6 rounded-[2rem]">
                    <h3 class="text-green-600 font-black text-lg mb-2">📚 図鑑について</h3>
                    <p class="text-slate-600 text-sm leading-relaxed font-bold">
                        ゲットした国旗は図鑑に登録され、首都や特徴などの詳細データが見られるようになります。図鑑のデータはブラウザのキャッシュに保存されています。
キャッシュをクリアすると、図鑑の収集状況が失われますのでご注意ください。
                    </p>
                </div>
            </div>
        `;
        document.getElementById('modal-overlay').classList.remove('hidden');
        document.getElementById('modal-overlay').classList.add('flex');
    }

    
    function confirmReset() {
        const overlay = document.getElementById('confirm-overlay');
        const yesBtn = document.getElementById('confirm-yes');
        document.getElementById('confirm-content').innerHTML = `<p class="text-slate-800 font-black text-lg">図鑑をリセットしますか？</p>`;
        yesBtn.onclick = () => {
            uiClick();
            state.collection = []; state.known = [];
            localStorage.removeItem(STORAGE_COLLECTION); localStorage.removeItem(STORAGE_KNOWN);
            closeConfirm(); goHome();
        };
        overlay.classList.remove('hidden'); overlay.classList.add('flex');
    }

    function startQuiz() {
        const shuffled = [...countryData].sort(() => Math.random() - 0.5);
        state.quiz = shuffled.slice(0, 10).map(c => {
            let opts = [c.n];
            let pool = countryData.filter(x => x.n !== c.n).sort(() => Math.random() - 0.5);
            opts.push(...pool.slice(0, 3).map(x => x.n));
            return { flag: c.f, name: c.n, options: opts.sort(() => Math.random() - 0.5) };
        });
        state.index = 0; state.correctCount = 0; state.getScore = 0; state.screen = 'quiz'; render();
    }

    function goHome() { state.screen = 'title'; render(); }
    function showCollection() { state.screen = 'collection'; render(); }
    window.onload = render;
</script>
</body>
</html>
