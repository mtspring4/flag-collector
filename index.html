<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>国旗マスター・エボリューション</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap');
        
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #0f172a;
            color: #1e293b;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: manipulation;
        }

        #app-container {
            width: 95%;
            max-width: 480px;
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            height: 92vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* 判定オーバーレイ */
        #judge-overlay {
            position: absolute;
            inset: 0;
            z-index: 500;
            pointer-events: none;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgba(255,255,255,0.4);
            backdrop-filter: blur(2px);
        }
        #judge-icon { font-size: 160px; transform: scale(0.5); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .judge-show #judge-icon { transform: scale(1); }

        /* タイマーバー */
        .timer-container { width: 100%; height: 6px; background: #f1f5f9; position: relative; overflow: hidden; }
        .timer-bar { height: 100%; background: #3b82f6; width: 100%; transition: width 0.1s linear; }
        .timer-low { background: #ef4444 !important; }

        /* ゲット演出レイヤー */
        #capture-scene {
            position: absolute;
            inset: 0;
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #ffffff 0%, #f1f5f9 100%);
            overflow: hidden;
        }

        /* 放射状の後光 */
        .halo-effect {
            position: absolute;
            width: 800px;
            height: 800px;
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                rgba(255, 215, 0, 0.4) 10deg,
                transparent 20deg,
                transparent 30deg,
                rgba(255, 215, 0, 0.4) 40deg,
                transparent 50deg,
                transparent 60deg,
                rgba(255, 215, 0, 0.4) 70deg,
                transparent 80deg,
                transparent 90deg,
                rgba(255, 215, 0, 0.4) 100deg,
                transparent 110deg,
                transparent 120deg,
                rgba(255, 215, 0, 0.4) 130deg,
                transparent 140deg,
                transparent 150deg,
                rgba(255, 215, 0, 0.4) 160deg,
                transparent 170deg,
                transparent 180deg,
                rgba(255, 215, 0, 0.4) 190deg,
                transparent 200deg,
                transparent 210deg,
                rgba(255, 215, 0, 0.4) 220deg,
                transparent 230deg,
                transparent 240deg,
                rgba(255, 215, 0, 0.4) 250deg,
                transparent 260deg,
                transparent 270deg,
                rgba(255, 215, 0, 0.4) 280deg,
                transparent 290deg,
                transparent 300deg,
                rgba(255, 215, 0, 0.4) 310deg,
                transparent 320deg,
                transparent 330deg,
                rgba(255, 215, 0, 0.4) 340deg,
                transparent 350deg
            );
            animation: rotate-halo 10s linear infinite;
            z-index: 201;
            display: none;
            mask-image: radial-gradient(circle, black 20%, transparent 70%);
            -webkit-mask-image: radial-gradient(circle, black 20%, transparent 70%);
        }
        @keyframes rotate-halo {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .ball {
            font-size: 5rem;
            position: absolute;
            bottom: 10%;
            left: 50%;
            margin-left: -2.5rem;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
            transition: all 0.6s cubic-bezier(0.17, 0.67, 0.36, 1.2);
            z-index: 202;
            transform: scale(1);
        }

        .ball-thrown {
            bottom: 50% !important;
            transform: scale(0.4) rotate(1080deg) translateY(50px);
        }

        @keyframes ball-wiggle {
            0%, 100% { transform: scale(0.4) rotate(0deg); }
            20% { transform: scale(0.4) rotate(-15deg); }
            40% { transform: scale(0.4) rotate(15deg); }
            60% { transform: scale(0.4) rotate(-10deg); }
            80% { transform: scale(0.4) rotate(10deg); }
        }
        .ball-wiggle { animation: ball-wiggle 0.4s ease-in-out infinite; }

        @keyframes flash {
            0% { background: white; opacity: 1; }
            100% { background: transparent; opacity: 0; }
        }
        .flash-effect { animation: flash 0.4s ease-out; position: absolute; inset: 0; z-index: 210; pointer-events: none; }

        @keyframes flag-captured {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }
        .flag-capture-anim { animation: flag-captured 0.3s forwards ease-in; }

        .flag-render {
            font-size: clamp(80px, 15vh, 130px);
            line-height: 1.2;
            filter: drop-shadow(0 20px 25px rgba(0,0,0,0.1));
            transition: all 0.3s ease;
        }

        .choice-btn {
            transition: all 0.2s;
            border: 2px solid #f1f5f9;
            min-height: 64px;
            font-weight: 900;
        }
        .choice-btn:active { transform: scale(0.95); }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .heart-particle { position: absolute; pointer-events: none; animation: heart-float 1s forwards ease-out; }
        @keyframes heart-float {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tw-x), var(--tw-y)) scale(1.5); opacity: 0; }
        }

        @keyframes fade-in-out {
            0% { opacity: 0; transform: scale(0.5); }
            10% { opacity: 1; transform: scale(1.1); }
            90% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.8); }
        }
        .animate-flag-switch { animation: fade-in-out 3s infinite; }
    </style>
</head>
<body>

        <!-- ゲット演出 -->
        <div id="capture-scene">

            <div id="capture-msg" class="mt-24 text-center z-[205] opacity-0 transition-opacity duration-300"></div>

        <!-- モーダル -->
        <div id="modal-overlay" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[600] hidden items-center justify-center p-6" onclick="closeModal()">
            <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl flex flex-col max-h-[85vh]" onclick="event.stopPropagation()">

            <div class="bg-white w-full max-w-xs rounded-[3rem] p-8 shadow-2xl text-center">

                <div class="grid grid-cols-2 gap-4 mt-6">
                    <button id="confirm-yes" class="bg-red-500 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition">はい</button>
                    <button onclick="closeConfirm()" class="bg-slate-100 text-slate-500 font-black py-4 rounded-2xl active:scale-95 transition">いいえ</button>

        <div id="game-content" class="h-full flex flex-col"></div>

                    </div>
                    <h1 class="text-4xl font-black text-slate-800 tracking-tighter leading-tight mb-4">国旗マスター<br><span class="text-blue-600">EVOLUTION</span></h1>
                    <p class="text-slate-400 mb-10 text-sm font-bold bg-white px-4 py-2 rounded-full shadow-sm">全254カ国の頂点を目指せ！</p>
                    <div class="w-full max-w-xs space-y-4">
                        <button onclick="startQuiz()" class="w-full bg-blue-600 text-white font-black py-5 rounded-3xl shadow-xl active:scale-95 transition text-xl">調査を開始</button>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="showCollection()" class="bg-white border-2 border-slate-200 text-slate-600 font-black py-4 rounded-3xl active:scale-95 shadow-sm text-sm">
                                ${isComp ? '👑 ' : ''}図鑑 ${state.collection.length}/${countryData.length}
                            </button>
                            <button onclick="showHowTo()" class="bg-blue-50 border-2 border-blue-100 text-blue-500 font-black py-4 rounded-3xl active:scale-95 text-sm shadow-sm">遊び方</button>
                        </div>
                    </div>
                </div>
            `;
            startTitleFlagRotation();
        } else if (state.screen === 'quiz') {
            stopTitleFlagRotation();
            const q = state.quiz[state.index];
            root.innerHTML = `
                <div class="flex-1 flex flex-col h-full overflow-hidden">
                    <div class="timer-container"><div id="timer-bar" class="timer-bar"></div></div>
                    <div class="p-4 flex justify-between items-center text-[11px] font-black">
                        <span class="text-slate-400 uppercase tracking-widest">Stage ${state.index + 1}/10</span>
                        <div class="flex gap-2">
                            <span class="bg-green-100 text-green-600 px-3 py-1 rounded-full shadow-sm">OK ${state.correctCount}</span>
                            <span class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full shadow-sm">GET ${state.getScore}</span>
                        </div>
                    </div>
                    <div class="flex-1 flex flex-col items-center justify-center py-4 bg-white relative">
                        <div class="flag-render">${q.flag}</div>
                        <h2 id="quiz-question-text" class="text-2xl font-black text-slate-800 mt-8 transition-all duration-300">これはどの国旗？</h2>
                    </div>
                    <div class="px-8 pb-12 overflow-y-auto custom-scroll bg-slate-50 pt-6">
                        <div class="grid grid-cols-1 gap-4">
                            ${q.options.map(opt => `
                                <button id="choice-${opt}" onclick="handleAnswer('${opt}')" 
                                    class="choice-btn bg-white rounded-2xl text-slate-700 shadow-sm text-lg border-b-4 border-slate-200 active:border-b-0 hover:bg-blue-50 transition-all">
                                    ${opt}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            startTimer();
        } else if (state.screen === 'result') {
            root.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-8 text-center bg-blue-600 text-white">
                    <div class="text-[80px] mb-4">🌏</div>
                    <h2 class="text-2xl font-black mb-2 uppercase tracking-widest">Result</h2>
                    <div class="text-xl font-bold mb-2 opacity-80">正解数: ${state.correctCount} / 10</div>
                    <div class="text-xl font-bold mb-2">ゲット数:</div>
                    <div class="text-8xl font-black mb-10">${state.getScore}</div>
                    <div class="w-full max-w-xs space-y-4">
                        <button onclick="startQuiz()" class="w-full bg-white text-blue-600 font-black py-5 rounded-3xl shadow-2xl active:scale-95">もう一度調査</button>
                        <button onclick="goHome()" class="w-full bg-blue-700 text-white font-black py-4 rounded-3xl active:scale-95 border border-blue-500">タイトルへ</button>
                    </div>
                </div>
            `;
        } else if (state.screen === 'collection') {
            root.innerHTML = `
                <div class="flex-1 flex flex-col h-full overflow-hidden">
                    <div class="p-6 flex items-center justify-between bg-white border-b shadow-sm z-10">
                        <button onclick="goHome()" class="p-2 text-slate-800 font-black text-2xl">←</button>
                        <h2 class="text-xl font-black text-slate-800 tracking-tighter">国旗図鑑 <span class="text-blue-600 ml-1">${state.collection.length}/${countryData.length}</span></h2>
                        <div class="w-10"></div>
                    </div>
                    <div class="flex-1 overflow-y-auto p-4 custom-scroll bg-slate-100">
                        <div class="grid grid-cols-3 gap-3 pb-8">
                            ${countryData.map(c => {
                                const isCaught = state.collection.includes(c.f);
                                const isKnown = state.known.includes(c.f);
                                return `
                                    <div onclick="showDetails('${c.f}')" class="aspect-square relative rounded-3xl flex flex-col items-center justify-center transition-all bg-white shadow-sm border-2 ${isCaught ? 'border-yellow-400' : (isKnown ? 'border-blue-100' : 'border-slate-50 opacity-20')}">
                                        ${isCaught ? '<div class="absolute -top-1 -right-1 bg-yellow-400 rounded-full w-6 h-6 flex items-center justify-center text-[10px] shadow-sm">⭐</div>' : ''}
                                        <div class="text-[44px] ${!isKnown ? 'grayscale' : ''}">${c.f}</div>
                                        <div class="text-[8px] font-black text-slate-400 mt-2 px-1 truncate w-full text-center">${isKnown ? c.n : '？？？'}</div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                        <div class="p-8">
                            <button onclick="confirmReset()" class="w-full py-4 text-red-400 font-black text-sm hover:text-red-600 transition">図鑑をリセットする</button>
                        </div>
                    </div>
                </div>
            `;
        }
    }

    function startTimer() {
        clearInterval(state.timerInterval);
        state.timeLeft = LIMIT_TIME;
        const bar = document.getElementById('timer-bar');
        state.timerInterval = setInterval(() => {
            state.timeLeft -= 0.1;
            const percentage = (state.timeLeft / LIMIT_TIME) * 100;
            if (bar) {
                bar.style.width = percentage + "%";
                if (state.timeLeft <= 3) bar.classList.add('timer-low');
            }
            if (state.timeLeft <= 0) {
                clearInterval(state.timerInterval);
                handleAnswer(null); // 時間切れ
            }
        }, 100);
    }

    function startTitleFlagRotation() {
        if(titleFlagInterval) clearInterval(titleFlagInterval);
        titleFlagInterval = setInterval(() => {
            state.titleFlag = countryData[Math.floor(Math.random()*countryData.length)].f;
            const el = document.getElementById('title-flag-display');
            if(el) el.textContent = state.titleFlag;
        }, 3000);
    }

    function stopTitleFlagRotation() {
        if(titleFlagInterval) clearInterval(titleFlagInterval);
    }

    function showHowTo() {
        const content = document.getElementById('modal-content');
        content.innerHTML = `
            <div class="text-left space-y-6 pb-6">
                <div class="bg-blue-50 p-6 rounded-[2rem]">
                    <h3 class="text-blue-600 font-black text-lg mb-2">🎮 基本ルール</h3>
                    <p class="text-slate-600 text-sm leading-relaxed font-bold">
                        1問につき制限時間は10秒です。正しい国名を選んでください。1回の調査は10問です。
                    </p>
                </div>
                <div class="bg-amber-50 p-6 rounded-[2rem]">
                    <h3 class="text-amber-600 font-black text-lg mb-2">🌏 キャッチの仕組み</h3>
                    <p class="text-slate-600 text-sm leading-relaxed font-bold">
                        クイズに正解すると、ボールを投げるチャンスが発生します。命中しても逃げられてしまうこともあります。
                    </p>
                </div>
                <div class="bg-green-50 p-6 rounded-[2rem]">
                    <h3 class="text-green-600 font-black text-lg mb-2">📚 図鑑について</h3>
                    <p class="text-slate-600 text-sm leading-relaxed font-bold">
                        ゲットした国旗は図鑑に登録され、首都や特徴などの詳細データが見られるようになります。図鑑のデータはブラウザのキャッシュに保存されています。
キャッシュをクリアすると、図鑑の収集状況が失われますのでご注意ください。
                    </p>
                </div>
            </div>
        `;
        document.getElementById('modal-overlay').classList.remove('hidden');
        document.getElementById('modal-overlay').classList.add('flex');
    }

    function confirmReset() {
        const overlay = document.getElementById('confirm-overlay');
        const yesBtn = document.getElementById('confirm-yes');
        document.getElementById('confirm-content').innerHTML = `
            <div class="text-6xl mb-4">🌏💦</div>
            <p class="text-slate-800 font-black text-lg mb-2">図鑑を消しますか？</p>
        `;
        yesBtn.onclick = () => {
            state.collection = []; state.known = [];
            localStorage.removeItem(STORAGE_COLLECTION);
            localStorage.removeItem(STORAGE_KNOWN);
            closeConfirm(); goHome();
        };
        overlay.classList.remove('hidden'); overlay.classList.add('flex');
    }

    function closeConfirm() { document.getElementById('confirm-overlay').classList.add('hidden'); }

    async function handleAnswer(choice) {
        if (state.isAnswering) return;
        state.isAnswering = true;
        clearInterval(state.timerInterval);

        const q = state.quiz[state.index];
        const isCorrect = choice === q.name;
        const isAlreadyCaught = state.collection.includes(q.flag);
        
        const overlay = document.getElementById('judge-overlay');
        const judgeIcon = document.getElementById('judge-icon');
        const questionText = document.getElementById('quiz-question-text');
        
        judgeIcon.textContent = isCorrect ? '⭕️' : '❌';
        judgeIcon.style.color = isCorrect ? '#22c55e' : '#ef4444';
        
        overlay.style.display = 'flex';
        setTimeout(() => overlay.classList.add('judge-show'), 10);

        if (choice) {
            const btn = document.getElementById(`choice-${choice}`);
            if (btn) btn.classList.add(isCorrect ? 'bg-green-100' : 'bg-red-100', isCorrect ? 'text-green-700' : 'text-red-700');
        }

        if (!isCorrect) {
            await new Promise(r => setTimeout(r, 600));
            // ❌を消して「逃げられた」を表示
            overlay.classList.remove('judge-show');
            setTimeout(() => overlay.style.display = 'none', 300);
            
            if (questionText) {
                questionText.textContent = choice === null ? "時間切れ！逃げられた！" : "逃げられた！";
                questionText.classList.remove('text-slate-800');
                questionText.classList.add('text-red-500', 'scale-125');
            }
            
            await new Promise(r => setTimeout(r, 1200));
            state.isAnswering = false;
            nextQuestion();
            return;
        }

        state.correctCount++;
        if (!state.known.includes(q.flag)) {
            state.known.push(q.flag);
            localStorage.setItem(STORAGE_KNOWN, JSON.stringify(state.known));
        }

        await new Promise(r => setTimeout(r, 1000));
        overlay.classList.remove('judge-show');
        setTimeout(() => overlay.style.display = 'none', 300);

        // ゲット演出開始
        const scene = document.getElementById('capture-scene');
        const target = document.getElementById('target-flag');
        const ball = document.getElementById('capture-ball');
        const actionMsg = document.getElementById('ball-action-msg');
        const resultMsgArea = document.getElementById('capture-msg');
        const fxLayer = document.getElementById('fx-layer');
        const halo = document.getElementById('halo-ring');
        
        resultMsgArea.classList.add('opacity-0');
        halo.style.display = 'none';
        target.textContent = q.flag;
        target.classList.remove('flag-capture-anim');
        target.style.opacity = "1";
        target.style.transform = "scale(1)";
        ball.classList.remove('ball-thrown', 'ball-wiggle');
        actionMsg.classList.add('opacity-0');
        ball.style.display = 'block';
        ball.style.bottom = "10%";
        scene.style.display = 'flex';

        await new Promise(r => setTimeout(r, 200));

        if (isAlreadyCaught) {
            actionMsg.textContent = "もうGETした国だ！";
            actionMsg.classList.remove('opacity-0');
            ball.style.display = 'none';
            for(let i=0; i<15; i++) setTimeout(() => createHeart(fxLayer), i * 50);
            await new Promise(r => setTimeout(r, 1800));
        } else {
            actionMsg.textContent = "ボールをなげた！";
            actionMsg.classList.remove('opacity-0');
            ball.classList.add('ball-thrown');
            
            await new Promise(r => setTimeout(r, 550));
            
            target.classList.add('flag-capture-anim');
            const flash = document.createElement('div');
            flash.className = 'flash-effect';
            fxLayer.appendChild(flash);
            setTimeout(() => flash.remove(), 400);

            ball.classList.add('ball-wiggle');
            actionMsg.classList.add('opacity-0');

            const waitTime = Math.random() > 0.6 ? 2200 : 1200; 
            await new Promise(r => setTimeout(r, waitTime));

            ball.classList.remove('ball-wiggle');
            const success = Math.random() < 0.5;

            if (success) {
                halo.style.display = 'block'; 
                resultMsgArea.innerHTML = `
                    <div class="text-red-600 font-black text-2xl drop-shadow-sm mb-1 uppercase tracking-tighter">${q.name}</div>
                    <div class="text-5xl font-black text-yellow-500 animate-bounce drop-shadow-lg">GET！</div>
                `;
                resultMsgArea.classList.remove('opacity-0');
                state.getScore++;
                for(let i=0; i<35; i++) createConfetti(fxLayer);
                state.collection.push(q.flag);
                localStorage.setItem(STORAGE_COLLECTION, JSON.stringify(state.collection));
                ball.style.transform = "scale(0.4) rotate(0deg)";
            } else {
                resultMsgArea.innerHTML = `<div class="text-3xl font-black text-slate-400">逃げられた！</div>`;
                resultMsgArea.classList.remove('opacity-0');
                ball.style.display = 'none';
                target.classList.remove('flag-capture-anim');
                target.style.opacity = "0.2";
            }
            await new Promise(r => setTimeout(r, 2200));
        }

        scene.style.display = 'none';
        state.isAnswering = false;
        nextQuestion();
    }

    function createHeart(parent) {
        const h = document.createElement('div');
        h.textContent = '💕'; h.className = 'heart-particle text-3xl';
        h.style.left = '50%'; h.style.top = '40%';
        const tx = (Math.random() - 0.5) * 300;
        const ty = (Math.random() - 0.5) * 300 - 100;
        h.style.setProperty('--tw-x', `${tx}px`);
        h.style.setProperty('--tw-y', `${ty}px`);
        parent.appendChild(h);
        setTimeout(() => h.remove(), 1000);
    }

    function createConfetti(parent) {
        const c = document.createElement('div');
        c.className = 'absolute w-2 h-2 rounded-full pointer-events-none';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.backgroundColor = ['#fbbf24', '#3b82f6', '#ef4444', '#10b981'][Math.floor(Math.random()*4)];
        c.style.top = '-20px'; c.style.zIndex = '210';
        parent.appendChild(c);
        const duration = Math.random() * 2 + 1;
        c.animate([{ transform: 'translateY(0) rotate(0deg)', opacity: 1 }, { transform: `translateY(100vh) rotate(${Math.random() * 720}deg)`, opacity: 0 }], { duration: duration * 1000 });
        setTimeout(() => c.remove(), duration * 1000);
    }

    function nextQuestion() {
        if (state.index < 9) { state.index++; render(); } else { state.screen = 'result'; render(); }
    }

    function showDetails(flagEmoji) {
        const country = countryData.find(c => c.f === flagEmoji);
        const isCaught = state.collection.includes(flagEmoji);
        const isKnown = state.known.includes(flagEmoji);
        const modal = document.getElementById('modal-overlay');
        const content = document.getElementById('modal-content');
        if (!isKnown) {
            content.innerHTML = `<div class="text-center py-6"><div class="text-8xl opacity-10 mb-6">${flagEmoji}</div><h3 class="text-2xl font-black text-slate-300 italic">UNKNOWN</h3></div>`;
        } else {
            content.innerHTML = `
                <div class="text-center pb-6">
                    <div class="text-8xl mb-4 drop-shadow-xl">${country.f}</div>
                    <h3 class="text-3xl font-black text-slate-800 mb-6">${country.n}</h3>
                    ${isCaught ? `
                        <div class="bg-blue-600 text-white p-5 rounded-3xl shadow-lg text-left">
                            <span class="text-[10px] font-black opacity-60 block uppercase mb-1">Capital</span>
                            <p class="font-black text-xl">${country.c || "---"}</p>
                        </div>
                        <div class="bg-slate-100 p-5 rounded-3xl mt-4 text-left">
                            <p class="text-slate-700 text-sm font-bold leading-relaxed">${country.k || "詳細データ収集中..."}</p>
                        </div>
                    ` : `<div class="p-6 border-2 border-dashed border-slate-200 rounded-3xl text-slate-400 font-bold">ゲットすると詳細が見れます</div>`}
                </div>`;
        }
        modal.classList.remove('hidden'); modal.classList.add('flex');
    }

    function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }

    function startQuiz() {
        const shuffled = [...countryData].sort(() => Math.random() - 0.5);
        state.quiz = shuffled.slice(0, 10).map(c => {
            let opts = [c.n];
            let pool = countryData.filter(x => x.n !== c.n).sort(() => Math.random() - 0.5);
            opts.push(...pool.slice(0, 3).map(x => x.n));
            return { flag: c.f, name: c.n, options: opts.sort(() => Math.random() - 0.5) };
        });
        state.index = 0; state.correctCount = 0; state.getScore = 0; state.screen = 'quiz'; render();
    }

    function goHome() { state.screen = 'title'; render(); }
    function showCollection() { state.screen = 'collection'; render(); }
    window.onload = render;
</script>
</body>
</html>
